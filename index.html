<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Rắn Săn Mồi - Classic Snake</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 10px;
            color: #4CAF50;
        }

        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
        }

        canvas {
            border: 4px solid #4CAF50;
            background-color: #111;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>RẮN SĂN MỒI</h1>
    <div id="score-board">Điểm: <span id="score">0</span></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">Sử dụng các phím mũi tên (↑, ↓, ←, →) để điều khiển</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        // Kích thước mỗi ô vuông và tốc độ game (ms)
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let gameInterval;

        // Khởi tạo trạng thái game
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1; // Hướng đi X (1: phải, -1: trái)
        let dy = 0; // Hướng đi Y (1: xuống, -1: lên)
        let score = 0;
        let gameSpeed = 100; // Tốc độ chạy (càng nhỏ càng nhanh)

        // Lắng nghe phím điều khiển từ người dùng
        document.addEventListener("keydown", changeDirection);

        // Bắt đầu vòng lặp game
        startGame();

        function startGame() {
            clearInterval(gameInterval);
            gameInterval = setInterval(update, gameSpeed);
        }

        // Hàm cập nhật trạng thái sau mỗi khung hình
        function update() {
            // 1. Di chuyển đầu rắn
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Kiểm tra va chạm tường hoặc va chạm chính mình
            if (checkCollision(head)) {
                alert("Game Over! Điểm của bạn là: " + score);
                resetGame();
                return;
            }

            // Thêm đầu mới vào thân rắn
            snake.unshift(head);

            // 2. Kiểm tra nếu rắn ăn mồi
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                // Nếu không ăn mồi thì cắt bỏ phần đuôi để giữ nguyên độ dài
                snake.pop();
            }

            // 3. Vẽ lại toàn bộ giao diện
            clearCanvas();
            drawFood();
            drawSnake();
        }

        // Xóa màn hình cũ
        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Vẽ con rắn
        function drawSnake() {
            snake.forEach((part, index) => {
                // Đầu rắn màu xanh đậm hơn, thân màu xanh sáng
                ctx.fillStyle = index === 0 ? "#2E7D32" : "#4CAF50";
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }

        // Vẽ quả táo (mồi)
        function drawFood() {
            ctx.fillStyle = "#F44336"; // Màu đỏ
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        // Tạo vị trí mồi ngẫu nhiên
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Đảm bảo mồi không mọc đè lên người rắn
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        // Xử lý nút bấm điều hướng (tránh việc rắn tự quay đầu 180 độ)
        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const LEFT = 37;
            const UP = 38;
            const RIGHT = 39;
            const DOWN = 40;

            if (keyPressed === LEFT && dx === 0) { dx = -1; dy = 0; }
            if (keyPressed === UP && dy === 0) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT && dx === 0) { dx = 1; dy = 0; }
            if (keyPressed === DOWN && dy === 0) { dx = 0; dy = 1; }
        }

        // Kiểm tra va chạm
        function checkCollision(head) {
            // Chạm tường
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            // Tự cắn đuôi
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        // Chơi lại từ đầu
        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            generateFood();
            startGame();
        }
    </script>
</body>
</html>
