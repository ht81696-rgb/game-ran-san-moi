<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Siêu Game Rắn Săn Mồi Pro</title>
    <style>
        :root {
            --primary-color: #2ecc71;
            --primary-dark: #27ae60;
            --accent-color: #e74c3c;
            --bg-color: #141923;
            --panel-color: #1f2736;
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 440px;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.4);
            margin-bottom: 5px;
        }

        /* Bảng điểm số */
        .stats-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 440px;
            background: var(--panel-color);
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: #8fa0be;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
        }
        #high-score { color: #f1c40f; }

        /* Khu vực điều khiển/Tùy chọn */
        .controls-panel {
            width: 100%;
            max-width: 440px;
            background: var(--panel-color);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .options-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .option-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 12px;
            color: #8fa0be;
            font-weight: 600;
        }

        select {
            background: #141923;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3);
        }

        /* Màn hình Game Canvas */
        .canvas-wrapper {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1/1;
            background: #0d1117;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 3px solid var(--panel-color);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Lớp phủ màn hình chờ/thua */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay-title {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: bold;
        }
        
        .overlay-desc {
            font-size: 14px;
            color: #8fa0be;
            margin-bottom: 20px;
            max-width: 280px;
        }

        /* Phím ảo điều khiển cho điện thoại */
        .mobile-keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 60px);
            gap: 10px;
            width: 100%;
            max-width: 240px;
            margin-top: 15px;
        }

        .key-btn {
            background: var(--panel-color);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .key-btn:active {
            background: #2b364a;
            transform: scale(0.95);
        }

        .key-up { grid-column: 2; grid-row: 1; }
        .key-left { grid-column: 1; grid-row: 2; }
        .key-right { grid-column: 3; grid-row: 2; }
        .key-down { grid-column: 2; grid-row: 3; }

        .desktop-tip {
            margin-top: 10px;
            font-size: 12px;
            color: #566681;
            text-align: center;
        }

        @media (min-width: 768px) {
            .mobile-keys { display: none; }
            .desktop-tip { display: block; }
        }
        @media (max-width: 767px) {
            .desktop-tip { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Snake Retro Master</h1>
    </header>

    <!-- Bảng thông số điểm số -->
    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-label">Điểm số</div>
            <div class="stat-value" id="current-score">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Kỷ lục cao nhất</div>
            <div class="stat-value" id="high-score">0</div>
        </div>
    </div>

    <!-- Thanh cấu hình & Nút bấm -->
    <div class="controls-panel">
        <div class="options-group">
            <div class="option-item">
                <label for="speed-select">Tốc độ (Độ khó)</label>
                <select id="speed-select">
                    <option value="150">Dễ (Chậm)</option>
                    <option value="100" selected>Trung bình</option>
                    <option value="60">Khó (Nhanh)</option>
                    <option value="40">Thử thách cực hạn</option>
                </select>
            </div>
            <div class="option-item">
                <label for="skin-select">Ngoại hình Rắn</label>
                <select id="skin-select">
                    <option value="classic" selected>Rắn Xanh lá lục</option>
                    <option value="cyber">Cyber Neon Xanh dương</option>
                    <option value="golden">Rắn Vàng Hoàng Gia</option>
                    <option value="ruby">Rắn Đỏ Ruby</option>
                </select>
            </div>
        </div>
        <button class="btn" id="start-btn">Bắt đầu chơi</button>
    </div>

    <!-- Khung chứa Game và Màn hình đè -->
    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <!-- Menu Lớp phủ khởi động hoặc Game Over -->
        <div class="overlay" id="game-overlay">
            <div class="overlay-title" id="overlay-title">Sẵn sàng?</div>
            <div class="overlay-desc" id="overlay-desc">Chọn tùy chọn bên trên rồi nhấn nút "Bắt đầu chơi" để xuất phát!</div>
        </div>
    </div>

    <!-- Phím ảo điều khiển cho Mobile -->
    <div class="mobile-keys">
        <div class="key-btn key-up" id="btn-up">▲</div>
        <div class="key-btn key-left" id="btn-left">◀</div>
        <div class="key-btn key-right" id="btn-right">▶</div>
        <div class="key-btn key-down" id="btn-down">▼</div>
    </div>

    <div class="desktop-tip">Dùng các phím Mũi tên (↑ ↓ ← →) hoặc WASD trên bàn phím máy tính</div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Dom Elements
        const scoreDisplay = document.getElementById("current-score");
        const highScoreDisplay = document.getElementById("high-score");
        const speedSelect = document.getElementById("speed-select");
        const skinSelect = document.getElementById("skin-select");
        const startBtn = document.getElementById("start-btn");
        const gameOverlay = document.getElementById("game-overlay");
        const overlayTitle = document.getElementById("overlay-title");
        const overlayDesc = document.getElementById("overlay-desc");

        // Cấu hình lưới bản đồ game
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        // Trạng thái vận hành game
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let score = 0;
        let highScore = parseInt(localStorage.getItem("snake_high_score")) || 0;
        let gameInterval = null;
        let isPlaying = false;
        let nextDirection = { x: 1, y: 0 }; 

        // Cấu hình bảng màu ngoại hình sinh động cho Rắn
        const skins = {
            classic: { head: "#27ae60", body: "#2ecc71", eye: "#fff" },
            cyber: { head: "#2980b9", body: "#3498db", eye: "#00ffff" },
            golden: { head: "#d35400", body: "#f1c40f", eye: "#fff" },
            ruby: { head: "#c0392b", body: "#e74c3c", eye: "#f39c12" }
        };

        // Cập nhật kỷ lục ban đầu từ bộ nhớ máy trình duyệt
        highScoreDisplay.innerText = highScore;

        // Bắt đầu hoặc thiết lập lại trò chơi
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            nextDirection = { x: 1, y: 0 };
            score = 0;
            scoreDisplay.innerText = score;
            generateFood();
            
            isPlaying = true;
            gameOverlay.classList.add("hidden");
            startBtn.innerText = "Chơi lại từ đầu";

            // Thiết lập tốc độ quét vòng lặp game dựa vào Option người chọn
            clearInterval(gameInterval);
            const speed = parseInt(speedSelect.value);
            gameInterval = setInterval(update, speed);
        }

        // Vòng lặp tính toán và vẽ lại từng khung hình
        function update() {
            dx = nextDirection.x;
            dy = nextDirection.y;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (checkCollision(head)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.innerText = score;
                
                if (score > highScore) {
                    highScore = score;
                    highScoreDisplay.innerText = highScore;
                    localStorage.setItem("snake_high_score", highScore);
                }
                generateFood();
            } else {
                snake.pop();
            }

            drawBackground();
            drawFood();
            drawSnake();
        }

        // Vẽ nền lưới caro chìm nghệ thuật nâng cao độ tương phản mắt nhìn
        function drawBackground() {
            ctx.fillStyle = "#0d1117";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "rgba(255, 255, 255, 0.015)";
            for (let i = 0; i < tileCount; i++) {
                for (let j = 0; j < tileCount; j++) {
                    if ((i + j) % 2 === 0) {
                        ctx.fillRect(i * gridSize, j * gridSize, gridSize, gridSize);
                    }
                }
            }
        }

        // Đồ họa con rắn cao cấp: Bo góc tròn mềm mại có chi tiết mắt long lanh
        function drawSnake() {
            const currentSkin = skins[skinSelect.value] || skins.classic;
            
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.fillStyle = isHead ? currentSkin.head : currentSkin.body;
                
                const radius = isHead ? 8 : 4;
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2, radius);
                ctx.fill();

                // Nếu là Đầu thì vẽ thêm hai con mắt điều hướng nhìn theo góc di chuyển cực sinh động
                if (isHead) {
                    ctx.fillStyle = currentSkin.eye;
                    let eyeX1 = 0, eyeY1 = 0, eyeX2 = 0, eyeY2 = 0;
                    const eyeSize = 3;

                    if (dx === 1) { // Hướng sang phải
                        eyeX1 = eyeX2 = part.x * gridSize + 14;
                        eyeY1 = part.y * gridSize + 5; eyeY2 = part.y * gridSize + 12;
                    } else if (dx === -1) { // Hướng sang trái
                        eyeX1 = eyeX2 = part.x * gridSize + 4;
                        eyeY1 = part.y * gridSize + 5; eyeY2 = part.y * gridSize + 12;
                    } else if (dy === -1) { // Hướng đi lên
                        eyeY1 = eyeY2 = part.y * gridSize + 4;
                        eyeX1 = part.x * gridSize + 5; eyeX2 = part.x * gridSize + 12;
                    } else if (dy === 1) { // Hướng đi xuống
                        eyeY1 = eyeY2 = part.y * gridSize + 14;
                        eyeX1 = part.x * gridSize + 5; eyeX2 = part.x * gridSize + 12;
                    }

                    ctx.beginPath(); ctx.arc(eyeX1, eyeY1, eyeSize, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(eyeX2, eyeY2, eyeSize, 0, Math.PI * 2); ctx.fill();
                }
            });
        }

        // Vẽ quả táo đỏ bóng bẩy lấp lánh (với hiệu ứng bóng đổ và cuống lá)
        function drawFood() {
            const fx = food.x * gridSize + gridSize / 2;
            const fy = food.y * gridSize + gridSize / 2;
            const radius = gridSize / 2 - 2;

            ctx.beginPath();
            ctx.arc(fx, fy, radius, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();

            // Điểm sáng lấp lánh trên quả táo tạo độ khối
            ctx.beginPath();
            ctx.arc(fx - 2, fy - 2, 2, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();

            // Cuống lá nhỏ màu xanh lá mọc bên trên quả táo
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(fx - 1, fy - radius - 2, 2, 4);
        }

        // Tạo vị trí ngẫu nhiên cho mồi thơm ngon tránh đè lên thân rắn đang uốn lượn
        function generateFood() {
            while (true) {
                let potentialFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                
                let isOverlap = false;
                for (let part of snake) {
                    if (part.x === potentialFood.x && part.y === potentialFood.y) {
                        isOverlap = true;
                        break;
                    }
                }
                
                if (!isOverlap) {
                    food = potentialFood;
                    break;
                }
            }
        }

        // Kiểm định ranh giới và va chạm tự ăn đuôi mình
        function checkCollision(head) {
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                return true;
            }
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    return true;
                }
            }
            return false;
        }

        // Trạng thái kết thúc màn chơi cuộc đua kết thúc
        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            
            overlayTitle.innerText = "GAME OVER";
            overlayTitle.style.color = "var(--accent-color)";
            overlayDesc.innerHTML = `Bạn đạt được <span style="color:#fff; font-size:20px; font-weight:bold;">${score}</span> điểm.<br>Hãy chỉnh lại độ khó hoặc thay skin rồi phục thù nhé!`;
            gameOverlay.classList.remove("hidden");
            startBtn.innerText = "Thử sức lại";
        }

        // Thiết lập bộ lọc hướng đi chuẩn xác không cho phép quay ngoắt 180 độ đột ngột tự sát
        function handleDirectionChange(targetX, targetY) {
            if (!isPlaying) return;
            if (targetX === -dx && targetX !== 0) return;
            if (targetY === -dy && targetY !== 0) return;
            nextDirection = { x: targetX, y: targetY };
        }

        // Lắng nghe sự kiện thao tác bàn phím (Bao gồm cả phím mũi tên lẫn cụm WASD huyền thoại)
        document.addEventListener("keydown", (e) => {
            switch(e.key.toLowerCase()) {
                case "arrowup": case "w": handleDirectionChange(0, -1); break;
                case "arrowdown": case "s": handleDirectionChange(0, 1); break;
                case "arrowleft": case "a": handleDirectionChange(-1, 0); break;
                case "arrowright": case "d": handleDirectionChange(1, 0); break;
            }
        });

        // Đăng ký tương tác mượt mà cho cụm Phím ảo di động (Mobile Touch buttons)
        document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); handleDirectionChange(0, -1); });
        document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); handleDirectionChange(0, 1); });
        document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); handleDirectionChange(-1, 0); });
        document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); handleDirectionChange(1, 0); });
        
        // Hỗ trợ click chuột cho nút ảo phòng trường hợp test trên PC bằng chuột
        document.getElementById("btn-up").addEventListener("click", () => handleDirectionChange(0, -1));
        document.getElementById("btn-down").addEventListener("click", () => handleDirectionChange(0, 1));
        document.getElementById("btn-left").addEventListener("click", () => handleDirectionChange(-1, 0));
        document.getElementById("btn-right").addEventListener("click", () => handleDirectionChange(1, 0));

        // Click nút Bắt đầu thao tác chính
        startBtn.addEventListener("click", initGame);

        // Vẽ màn hình chờ khởi động ban đầu sống động nghệ thuật
        drawBackground();
    </script>
</body>
</html>
